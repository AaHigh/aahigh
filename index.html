// ── DM WORD LABEL — exact from CELLTOWER ────────────────────
function _dmWordLabel(ctx, word, x, y, w, h, color){
  const str=word.toUpperCase(); const n=str.length; if(!n)return;
  const dotW=Math.min(w/(n*6), h/8);
  const dotH=dotW;
  const charW=6*dotW; const charH=7*dotH;
  const totalW=n*charW;
  const startX=x+(w-totalW)/2;
  const startY=y+(h-charH)/2;
  ctx.fillStyle=color||'#fff';
  ctx.shadowColor=color||'#fff';
  ctx.shadowBlur=dotW*1.5;
  for(let ci=0;ci<n;ci++){
    const ch=str[ci];
    const glyph=DM_FONT[ch]||DM_FONT[' '];
    const ox=startX+ci*charW;
    for(let col=0;col<5;col++){
      const colBits=glyph[col]||0;
      for(let row=0;row<7;row++){
        if(colBits&(1<<row)){
          ctx.fillRect(ox+col*dotW, startY+row*dotH,
            Math.max(1,dotW-0.5), Math.max(1,dotH-0.5));
        }
      }
    }
  }
  ctx.shadowBlur=0;
}

// Rainbow per-character — exact formula from CELLTOWER identity screen
function _dmRainbow(ctx, str, x, y, w, h, t){
  const n=str.length; if(!n)return;
  const dotW=Math.min(w/(n*6), h/8);
  const dotH=dotW;
  const charW=6*dotW; const charH=7*dotH;
  const totalW=n*charW;
  const startX=x+(w-totalW)/2;
  const startY=y+(h-charH)/2;
  for(let ci=0;ci<n;ci++){
    const hue=(t*60+ci*(360/n))%360;
    const col=`hsl(${hue},100%,62%)`;
    const ch=str[ci].toUpperCase();
    const glyph=DM_FONT[ch]||DM_FONT[' '];
    const ox=startX+ci*charW;
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=dotW*2.5;
    for(let c=0;c<5;c++){
      const colBits=glyph[c]||0;
      for(let row=0;row<7;row++){
        if(colBits&(1<<row)){
          ctx.fillRect(ox+c*dotW, startY+row*dotH,
            Math.max(1,dotW-0.5), Math.max(1,dotH-0.5));
        }
      }
    }
  }
  ctx.shadowBlur=0;
}

// Hidden text inputs for mobile keyboard
let _inputEl=null;

function makeInput(){
  if(_inputEl){ document.body.removeChild(_inputEl); _inputEl=null; }
  const inp=document.createElement('input');
  inp.type='text';
  inp.autocomplete='off'; inp.autocorrect='off';
  inp.autocapitalize='characters'; inp.spellcheck=false;
  inp.style.cssText='position:fixed;left:-9999px;top:0;opacity:0;width:1px;height:1px;';
  document.body.appendChild(inp);
  inp.addEventListener('input',()=>{
    let v=inp.value.toUpperCase().replace(/[^A-Z0-9 .!?'-]/g,'');
    if(regFocus===1) v=v.replace(/[^A-Z]/g,'').slice(0,3);
    else if(regFocus===0) v=v.slice(0,12);
    else v=v.slice(0,40);
    inp.value=v;
    if(regFocus===0) regInputs.name=v;
    else if(regFocus===1) regInputs.init=v;
    else regInputs.game=v;
    regErr='';
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key==='Go'||e.key==='Next'){
      e.preventDefault();
      if(regFocus<2){ regFocus++; syncInputFocus(); }
      else submitReg();
    }
  });
  _inputEl=inp;
  return inp;
}

function syncInputFocus(){
  if(!_inputEl) return;
  _inputEl.value = regFocus===0?regInputs.name:regFocus===1?regInputs.init:regInputs.game;
  _inputEl.focus();
  _inputEl.setSelectionRange(9999,9999);
}

// ── DRAW FRAME ────────────────────────────────────────────────
function drawFrame(ts){
  const dt=Math.min((ts-_last)/1000, 0.05);
  _last=ts; AT=ts/1000;
  hitZones=[];

  // background
  CTX.fillStyle=C.bg;
  CTX.fillRect(0,0,SW,SH);

  // grid
  CTX.strokeStyle='rgba(85,0,170,0.12)';
  CTX.lineWidth=1;
  const GRID=Math.round(SW*0.08);
  for(let x=0;x<SW;x+=GRID){CTX.beginPath();CTX.moveTo(x,0);CTX.lineTo(x,SH);CTX.stroke();}
  for(let y=0;y<SH;y+=GRID){CTX.beginPath();CTX.moveTo(0,y);CTX.lineTo(SW,y);CTX.stroke();}

  // ticker marquee at bottom
  _drawTicker(dt);

  // corner brackets
  _drawBrackets();

  // header: ahightower.com rainbow
  _drawHeader();

  // route to state
  if(STATE==='PIN')       _drawPin();
  else if(STATE==='REGISTER') _drawRegister();
  else if(STATE==='GREET')    _drawGreet();
  else if(STATE==='HUB')      _drawHub();

  requestAnimationFrame(drawFrame);
}

// ── HEADER — rainbow ahightower.com exactly like CELLTOWER ──
function _drawHeader(){
  const str='ahightower.com';
  const hY=PORTRAIT?SH*0.04:SH*0.05;
  const hH=PORTRAIT?SH*0.07:SH*0.10;
  const hX=SW*0.04; const hW=SW*0.92;
  _dmRainbow(CTX, str, hX, hY, hW, hH, AT);

  // subline
  const sub='THE HIGH TOWER DISTRICT \u00b7 FRESNO CA';
  CTX.font=`600 ${Math.round(SW*0.024)}px monospace`;
  CTX.fillStyle=C.dim; CTX.textAlign='center'; CTX.textBaseline='top';
  CTX.shadowBlur=0;
  CTX.fillText(sub, SW/2, hY+hH+SW*0.01);
}

// ── TICKER ───────────────────────────────────────────────────

  const TH=Math.round(SH*0.04);
  const TY=SH-TH;
  CTX.fillStyle='rgba(0,0,16,0.9)';
  CTX.fillRect(0,TY,SW,TH);
  CTX.strokeStyle=C.border; CTX.lineWidth=1;
  CTX.beginPath(); CTX.moveTo(0,TY); CTX.lineTo(SW,TY); CTX.stroke();

  const PX_PER_SEC=SW*0.25;
  _mqX-=PX_PER_SEC*dt;
  _mqHueOff+=PX_PER_SEC*0.5*dt;

  const dotH=TH*0.55;
  const dotW=dotH/8*1.1;
  const charW=6*dotW; const charH=7*(dotW);
  const totalW=_mqMsg.length*charW;
  if(_mqX<-totalW) _mqX+=totalW;

  // draw two copies for seamless loop
  for(let copy=0;copy<2;copy++){
    const ox=_mqX+copy*totalW;
    for(let ci=0;ci<_mqMsg.length;ci++){
      const cx2=ox+ci*charW;
      if(cx2<-charW||cx2>SW+charW) continue;
      const hue=((_mqHueOff+ci*charW)*0.8)%360;
      const col=`hsl(${hue},100%,62%)`;
      const ch=_mqMsg[ci].toUpperCase();
      const glyph=DM_FONT[ch]||DM_FONT[' '];
      CTX.fillStyle=col; CTX.shadowColor=col; CTX.shadowBlur=3;
      for(let c=0;c<5;c++){
        const bits=glyph[c]||0;
        for(let row=0;row<7;row++){
          if(bits&(1<<row)){
            CTX.fillRect(
              Math.round(cx2+c*dotW),
              Math.round(TY+(TH-charH)/2+row*dotW),
              Math.max(1,dotW-0.5), Math.max(1,dotW-0.5)
            );
          }
        }
      }
    }
  }
  CTX.shadowBlur=0;
}

// ── CORNER BRACKETS ──────────────────────────────────────────
function _drawBrackets(){
  const s=Math.round(SW*0.05);
  const m=Math.round(SW*0.03);
  const T=Math.round(SH*0.04)+m;
  const B=SH-Math.round(SH*0.04)-m;
  CTX.strokeStyle=C.border; CTX.lineWidth=2;
  [[m,T,1,1],[SW-m,T,-1,1],[m,B,1,-1],[SW-m,B,-1,-1]].forEach(([x,y,dx,dy])=>{
    CTX.beginPath();
    CTX.moveTo(x+s*dx,y); CTX.lineTo(x,y); CTX.lineTo(x,y+s*dy);
    CTX.stroke();
  });
}

// ── TYPEWRITER ───────────────────────────────────────────────
function twTick(){
  if(twIdx<twTarget.length && AT*1000>twNextT){
    twText=twTarget.slice(0,twIdx+1);
    twIdx++;
    twNextT=AT*1000+(twTarget[twIdx-1]==='\n'?120:42);
  }
}

  if(twIdx>=twTarget.length && Math.floor(AT*2)%2===0){

    const lw=CTX.measureText(lastLine).width;

    CTX.fillStyle=C.orange;
    CTX.fillRect(cx2, cy2, fSz*0.5, fSz);
  }

  // PIN display — phone number format (XXX) XXX-XXXX
  const pinY=headerBottom+available*0.42;

    CTX.fillStyle=C.dim; CTX.shadowBlur=0;

  const hintY=acY+acSz*1.9;
  CTX.font=`500 ${hintSz}px monospace`;
  CTX.fillStyle=C.dim; CTX.textAlign='center';
  CTX.fillText('US: USE YOUR AREA CODE + PHONE NUMBER', SW/2, hintY);

  // error
  if(_pinErr && AT<_pinErrUntil){
    CTX.font=`700 ${Math.round(hintSz*1.1)}px monospace`;
    CTX.fillStyle=C.red; CTX.shadowColor=C.red; CTX.shadowBlur=6;
    CTX.fillText(_pinErr, SW/2, hintY+hintSz*2.2);
    CTX.shadowBlur=0;
  }

  // keypad
  _drawKeypad(headerBottom+available*0.60);
}

let _pinErr='', _pinErrUntil=0;
function showPinErr(msg){ _pinErr=msg; _pinErrUntil=AT+2.2; }

function _pinCellH(){ return Math.round(SW*0.075); }

function _drawPinCells(y){
  const H=_pinCellH(); const W=H*1.1;
  const GAP=Math.round(SW*0.012);
  const SEP=Math.round(SW*0.018);
  // layout: ( d0 d1 d2 ) d3 d4 d5 - d6 d7 d8 d9
  // total cells: 10 digits + separators
  const totalW=10*W+9*GAP+3*SEP; // parens and dash as extra space
  let x=SW/2-totalW/2;
  const drawCell=(idx)=>{
    const filled=idx<pinBuf.length;
    const active=idx===pinBuf.length;
    const blink=active&&Math.floor(AT*2)%2===0;
    CTX.fillStyle=filled?'rgba(255,136,0,0.1)':'rgba(0,0,0,0.3)';
    CTX.fillRect(x,y,W,H);
    const bc=filled?C.orange:active?C.cyan:C.border;
    CTX.strokeStyle=bc; CTX.lineWidth=filled?2:1;
    if(blink){ CTX.shadowColor=C.cyan; CTX.shadowBlur=8; }
    CTX.strokeRect(x+CTX.lineWidth/2,y+CTX.lineWidth/2,W-CTX.lineWidth,H-CTX.lineWidth);
    CTX.shadowBlur=0;
    if(filled){
      // show actual digit — no masking, this is an arcade not a bank
      const digit=pinBuf[idx];
      const dSz=Math.round(H*0.52);
      CTX.font=`900 ${dSz}px monospace`;
      CTX.fillStyle=C.orange; CTX.shadowColor=C.orange; CTX.shadowBlur=8;
      CTX.textAlign='center'; CTX.textBaseline='middle';
      CTX.fillText(digit, x+W/2, y+H/2+1);
      CTX.shadowBlur=0;
    }
    x+=W+GAP;
  };
  const sepChar=(ch)=>{
    CTX.fillStyle=C.dim; CTX.font=`700 ${Math.round(H*0.55)}px monospace`;
    CTX.textAlign='center'; CTX.textBaseline='middle';
    CTX.fillText(ch, x+SEP/2, y+H/2);
    x+=SEP;
  };
  sepChar('(');
  drawCell(0); drawCell(1); drawCell(2);
  sepChar(')');
  drawCell(3); drawCell(4); drawCell(5);
  sepChar('-');
  drawCell(6); drawCell(7); drawCell(8); drawCell(9);
}

// ── KEYPAD — ATM flat grid ───────────────────────────────────
const KEYS=[
  [{v:'1',sub:''}, {v:'2',sub:'ABC'}, {v:'3',sub:'DEF'}],
  [{v:'4',sub:'GHI'}, {v:'5',sub:'JKL'}, {v:'6',sub:'MNO'}],
  [{v:'7',sub:'PQRS'}, {v:'8',sub:'TUV'}, {v:'9',sub:'WXYZ'}],
  [{v:'star',sub:'CLR'}, {v:'0',sub:'OPER'}, {v:'hash',sub:'ENT'}],
];

let _keyPressId=null, _keyPressUntil=0;

function _drawKeypad(topY){
  const availH=SH-SH*0.04-topY;
  const KW=Math.min(SW*0.26, availH*0.22);
  const KH=KW*0.7;
  const KGAP=Math.round(SW*0.025);
  const gridW=3*KW+2*KGAP;
  const gridH=4*KH+3*KGAP;
  const kx0=SW/2-gridW/2;
  const ky0=topY+(availH-gridH)/2;

  // label
  const lblSz=Math.round(SW*0.022);
  CTX.font=`500 ${lblSz}px monospace`;
  CTX.fillStyle=C.dim; CTX.textAlign='center'; CTX.shadowBlur=0;
  CTX.fillText('TEAM RUSH \u00b7 PLAYER IDENTIFICATION \u00b7 10-DIGIT PIN', SW/2, ky0-lblSz*1.5);

  hitZones=hitZones.filter(h=>!h.id.startsWith('key_'));
  KEYS.forEach((row,ri)=>{
    row.forEach((key,ci)=>{
      const kx=kx0+ci*(KW+KGAP);
      const ky=ky0+ri*(KH+KGAP);
      const pressed=_keyPressId===key.v&&AT<_keyPressUntil;
      const isHash=key.v==='hash';
      const isStar=key.v==='star';

      // body
      CTX.fillStyle=isHash?'rgba(255,136,0,0.12)':pressed?'rgba(255,255,255,0.05)':'rgba(10,5,20,0.8)';
      CTX.fillRect(kx, ky+(pressed?2:0), KW, KH-(pressed?2:0));
      CTX.strokeStyle=isHash?C.orange:C.border;
      CTX.lineWidth=isHash?2:1;
      CTX.strokeRect(kx+CTX.lineWidth/2, ky+(pressed?2:0)+CTX.lineWidth/2,
        KW-CTX.lineWidth, KH-(pressed?2:0)-CTX.lineWidth);
      if(!pressed){
        CTX.fillStyle='rgba(0,0,0,0.5)';
        CTX.fillRect(kx,ky+KH-3,KW,3);
      }

      // digit
      const numSz=Math.round(KH*0.45);
      const numLabel=isStar?'\u2731':isHash?'#':key.v;
      const numCol=isHash?C.orange:isStar?C.dim:C.white;
      CTX.font=`900 ${numSz}px monospace`;
      CTX.fillStyle=numCol; CTX.textAlign='center'; CTX.textBaseline='middle';
      if(isHash||isStar){ CTX.shadowColor=numCol; CTX.shadowBlur=8; }
      CTX.fillText(numLabel, kx+KW/2, ky+(pressed?2:0)+KH*0.42);
      CTX.shadowBlur=0;

      // sub
      if(key.sub){
        const subSz=Math.round(KH*0.18);
        CTX.font=`500 ${subSz}px monospace`;
        CTX.fillStyle=isHash?C.orange:C.dim;
        CTX.fillText(key.sub, kx+KW/2, ky+(pressed?2:0)+KH*0.75);
      }

      addHit('key_'+key.v, kx, ky, KW, KH);
    });
  });

  // legend
  const legSz=Math.round(SW*0.02);
  CTX.font=`500 ${legSz}px monospace`;
  CTX.fillStyle=C.dim; CTX.textAlign='left';
  CTX.fillText('\u2731 = CLEAR ALL', kx0, ky0+gridH+legSz*1.5);
  CTX.textAlign='right';
  CTX.fillText('# = CONFIRM', kx0+gridW, ky0+gridH+legSz*1.5);
}

  CTX.fillText('('+pinBuf.slice(0,3)+') '+pinBuf.slice(3,6)+'-'+pinBuf.slice(6,10), SW/2, cy2+badgeH*0.38);

function _drawField(label,hint,val,max,x,y,w,h,active){
  CTX.fillStyle=active?'rgba(255,136,0,0.06)':'rgba(0,0,8,0.5)';
  CTX.fillRect(x,y,w,h);
  CTX.strokeStyle=active?C.orange:C.border; CTX.lineWidth=active?2:1;
  CTX.strokeRect(x+CTX.lineWidth/2,y+CTX.lineWidth/2,w-CTX.lineWidth,h-CTX.lineWidth);

  const lbSz=Math.round(h*0.22);
  CTX.font=`700 ${lbSz}px monospace`;
  CTX.fillStyle=active?C.orange:C.dim; CTX.textAlign='left'; CTX.textBaseline='top';
  CTX.fillText(label, x+h*0.12, y+h*0.1);

  const valSz=Math.round(h*0.3);
  CTX.font=`900 ${valSz}px monospace`;
  CTX.fillStyle=C.white; CTX.textBaseline='middle';
  const disp=val||(active?'':hint);
  CTX.fillStyle=val?C.white:C.dim;
  CTX.fillText(disp.slice(0,max), x+h*0.12, y+h*0.62);

  // cursor
  if(active && Math.floor(AT*2)%2===0){
    const tw=CTX.measureText(val).width;
    CTX.fillStyle=C.orange;
    CTX.fillRect(x+h*0.12+tw+2, y+h*0.48, valSz*0.5, valSz);
  }

  // char count
  const cntSz=Math.round(lbSz*0.8);
  CTX.font=`500 ${cntSz}px monospace`;
  CTX.fillStyle=val.length>=max?C.orange:C.dim; CTX.textAlign='right';
  CTX.fillText(val.length+'/'+max, x+w-h*0.1, y+h*0.12);
}

// ── GREET SCREEN ─────────────────────────────────────────────
function _drawGreet(){
  const p=greetPlayer; if(!p) return;

  const tickerTop=SH-SH*0.04;
  const available=tickerTop-headerBottom;

  let cy2=headerBottom+available*0.04;

  // TEAM RUSH tag
  const tagSz=Math.round(SW*0.025);
  CTX.font=`700 ${tagSz}px monospace`;
  CTX.fillStyle=C.dim; CTX.textAlign='center'; CTX.textBaseline='top';
  CTX.fillText(greetIsNew?'NEW TEAM RUSH MEMBER':'TEAM RUSH MEMBER', cx2, cy2);
  cy2+=tagSz*2.2;

  // Location
  if(p.loc){
    CTX.font=`700 ${Math.round(tagSz*1.1)}px monospace`;
    CTX.fillStyle=C.cyan; CTX.shadowColor=C.cyan; CTX.shadowBlur=8;
    CTX.fillText('\u25b8 '+p.loc, cx2, cy2); CTX.shadowBlur=0;
    cy2+=tagSz*2.5;
  }

  // Big initials rainbow
  const initH=available*0.2;
  _dmRainbow(CTX, p.init, cx2-SW*0.25, cy2, SW*0.5, initH, AT);

  // Name

  const vSz=Math.round(SW*0.026);

  // Rule
  const rW=SW*0.55;
  const grad=CTX.createLinearGradient(cx2-rW/2,0,cx2+rW/2,0);
  grad.addColorStop(0,'transparent'); grad.addColorStop(0.5,C.orange); grad.addColorStop(1,'transparent');
  CTX.strokeStyle=grad; CTX.lineWidth=1;
  CTX.beginPath(); CTX.moveTo(cx2-rW/2,cy2); CTX.lineTo(cx2+rW/2,cy2); CTX.stroke();
  cy2+=pSz*2.5;

  // Buttons
  const btnW=Math.min(SW*0.82, 340);
  const btnH=Math.round(SH*0.075);
  const btnX=cx2-btnW/2;
  const btnGap=Math.round(SH*0.018);

  // Primary — PLAY CELLTOWER
  CTX.fillStyle=C.orange;
  CTX.fillRect(btnX,cy2,btnW,btnH);
  const bSz=Math.round(btnH*0.36);
  CTX.font=`900 ${bSz}px monospace`;
  CTX.fillStyle='#000'; CTX.textAlign='center'; CTX.textBaseline='middle';
  CTX.fillText('\u25b6  PLAY CELLTOWER', cx2, cy2+btnH/2);
  addHit('hub_celltower', btnX, cy2, btnW, btnH);
  cy2+=btnH+btnGap;

  // Ghost — WHO IS AARON HIGHTOWER
  CTX.strokeStyle=C.border; CTX.lineWidth=1;
  CTX.fillStyle='rgba(85,0,170,0.08)';
  CTX.fillRect(btnX,cy2,btnW,btnH);
  CTX.strokeRect(btnX+0.5,cy2+0.5,btnW-1,btnH-1);
  CTX.font=`900 ${bSz}px monospace`;
  CTX.fillStyle=C.purple; CTX.textAlign='center'; CTX.textBaseline='middle';
  CTX.fillText('\u25c8  WHO IS AARON HIGHTOWER', cx2, cy2+btnH/2);
  addHit('hub_bio', btnX, cy2, btnW, btnH);
  cy2+=btnH+btnGap*2;

  // Sign out
  const soSz=Math.round(SW*0.022);
  CTX.font=`500 ${soSz}px monospace`;
  CTX.fillStyle=C.dim; CTX.textAlign='center';
  CTX.fillText('[ SWITCH PLAYER ]', cx2, cy2);
  addHit('hub_signout', cx2-80, cy2-4, 160, soSz*1.8);

  // Status dot
  cy2+=soSz*3;
  const dotPulse=0.5+0.5*Math.sin(AT*2.4);
  CTX.fillStyle=`rgba(0,255,136,${0.4+dotPulse*0.6})`;
  CTX.shadowColor=C.green; CTX.shadowBlur=6*dotPulse;
  CTX.beginPath(); CTX.arc(cx2-60, cy2, soSz*0.38, 0, Math.PI*2); CTX.fill();
  CTX.shadowBlur=0;
  CTX.font=`500 ${soSz}px monospace`; CTX.fillStyle=C.dim; CTX.textAlign='left';
  CTX.fillText('SIGNAL ACTIVE \u00b7 TOWER DISTRICT', cx2-48, cy2+1);
}

// ── SUBMIT REGISTER ──────────────────────────────────────────
function submitReg(){
  const name=regInputs.name.trim();
  const init=regInputs.init.trim().replace(/[^A-Z]/gi,'').toUpperCase();
  const game=regInputs.game.trim();
  if(!name){regErr='ENTER YOUR DRIVER NAME';return;}
  if(init.length!==3){regErr='INITIALS: EXACTLY 3 LETTERS';return;}
  if(!game){regErr='ENTER YOUR FAVORITE ARCADE GAME';return;}
  const players=loadP();
  const p={pin:pinBuf,name:name.toUpperCase(),init,game:game.toUpperCase(),
    loc:lookupAC(pinBuf)||'',joined:Date.now(),visits:0};
  players[pinBuf]=p; saveP(players); saveS(pinBuf);
  if(_inputEl){_inputEl.blur(); document.body.removeChild(_inputEl); _inputEl=null;}
  greetPlayer=p; greetIsNew=true;
  STATE='GREET';
}

// ── TOUCH / CLICK ────────────────────────────────────────────
function handleTap(px,py){
  const hz=hitZones.find(h=>px>=h.x&&px<=h.x+h.w&&py>=h.y&&py<=h.y+h.h);
  if(!hz) return;
  const id=hz.id;

  if(id.startsWith('key_')){
    const v=id.slice(4);
    _keyPressId=v; _keyPressUntil=AT+0.12;
    if(v==='star'){ pinBuf=''; return; }
    if(v==='hash'){ handlePinSubmit(); return; }
    if(pinBuf.length<PIN_LEN){ pinBuf+=v; if(pinBuf.length===PIN_LEN) setTimeout(handlePinSubmit,80); }
    return;
  }
  if(id==='greet_enter'){
    const p2=loadP()[getS()];
    if(p2){ p2.visits=(p2.visits||0)+1; const pl=loadP(); pl[p2.pin]=p2; saveP(pl); }
    STATE='HUB'; return;
  }
  if(id==='hub_celltower'){
    const p2=loadP()[getS()];
    if(p2) sessionStorage.setItem('ct_initials', p2.init);
    // Detect real deployment vs artifact/local preview.
    // On ahightower.com: navigate same tab (Safari blocks window.open from canvas).
    // In artifact / localhost / preview: open new tab (navigation would break the preview).
    const host=window.location.hostname;
    const isLive=(host==='ahightower.com'||host==='aahigh.github.io'||host.endsWith('.ahightower.com'));
    if(isLive){
      window.location.href='https://aahigh.github.io/CELLTOWER/';
    } else {
      window.open('https://aahigh.github.io/CELLTOWER/','_blank','noopener');
    }
    return;
  }
  if(id==='hub_bio'){ window.location.href='./bio.html'; return; }
  if(id==='hub_signout'){
    clearS(); pinBuf=''; STATE='PIN';
    twText=''; twIdx=0; twNextT=AT*1000;
    return;
  }
  // register fields
  if(id.startsWith('reg_field_')){
    regFocus=parseInt(id.slice(10));
    if(!_inputEl) makeInput();
    syncInputFocus();
    return;
  }
  if(id==='reg_submit'){ submitReg(); return; }
}

function handlePinSubmit(){
  if(pinBuf.length<PIN_LEN){ showPinErr('ENTER ALL 10 DIGITS'); return; }
  const players=loadP();
  if(players[pinBuf]){
    // returning player — straight to hub, no friction
    saveS(pinBuf);
    const p=players[pinBuf];
    p.visits=(p.visits||0)+1;
    players[pinBuf]=p; saveP(players);
    STATE='HUB';
  } else {
    // new player — register first
    regInputs={name:'',init:'',game:''}; regFocus=0; regErr='';
    STATE='REGISTER';
    if(!_inputEl) makeInput();
    setTimeout(()=>syncInputFocus(),300);
  }
}

cv.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const r=cv.getBoundingClientRect();
  handleTap(t.clientX-r.left, t.clientY-r.top);
},{passive:false});

cv.addEventListener('click', e=>{
  const r=cv.getBoundingClientRect();
  handleTap(e.clientX-r.left, e.clientY-r.top);
});

window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize,200));

// ── INIT ─────────────────────────────────────────────────────
(function init(){
  resize();
  const pin=getS();
  if(pin){
    const p2=loadP()[pin];
    if(p2){ STATE='HUB'; }
  }
  // start typewriter
  twTarget=TW_MSGS[0]; twIdx=0; twText=''; twNextT=0;
  requestAnimationFrame(drawFrame);
})();
</script>
